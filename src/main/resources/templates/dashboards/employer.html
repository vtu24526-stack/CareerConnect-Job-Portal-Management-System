<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Employer Dashboard')}"></head>
<body>
    <div class="bg-pattern" style="opacity: 0.1"></div>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <main class="container animate-fade-up" style="max-width: 1000px; margin-top: 3rem;">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 2.5rem;">
            <div>
                <p style="color:var(--text-secondary); font-weight:600; text-transform:uppercase; font-size:0.85rem; letter-spacing:0.05em; margin-bottom:0.25rem;">Overview</p>
                <h1 style="font-size: 2.25rem; letter-spacing:-0.03em;">Employer Dashboard</h1>
            </div>
            <a th:href="@{/employer/job/add}" class="btn btn-primary" style="padding: 0.75rem 1.5rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px; margin-right:0.5rem;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Post New Job
            </a>
        </div>
        
        <div class="card" style="padding: 2rem;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.25rem;">Active Postings</h2>
            </div>
            
            <div th:if="${jobs.empty}" style="padding: 4rem 2rem; text-align:center; background: #fafafa; border-radius: var(--radius-lg); border: 1px dashed var(--border-color);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px; color:var(--text-tertiary); margin-bottom:1rem;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                <h3 style="font-size:1.1rem; margin-bottom:0.5rem;">No jobs posted</h3>
                <p style="color:var(--text-secondary); font-size:0.95rem;">You haven't posted any jobs yet. Create a posting to start hiring.</p>
            </div>
            
            <div th:unless="${jobs.empty}" class="table-responsive" style="border-radius: var(--radius-md); box-shadow: none; border: 1px solid var(--border-light);">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Position & Location</th>
                            <th style="text-align:center;">Applicants</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="job : ${jobs}">
                            <td style="padding: 1.25rem 1.5rem;">
                                <div style="font-weight:600; color:var(--text-primary); margin-bottom:0.25rem;" th:text="${job.title}">Title</div>
                                <div style="font-size:0.85rem; color:var(--text-secondary);" th:text="${job.location}">Location</div>
                            </td>
                            <td style="text-align:center; vertical-align:middle;">
                                <span class="badge badge-blue" style="font-size:0.85rem; padding: 0.25rem 0.75rem;" th:text="${job.applications.size()} + ' Total'">0</span>
                            </td>
                            <td style="text-align:right; vertical-align:middle; padding-right:1.5rem;">
                                <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                                    <a th:href="@{/employer/job/{id}/applications(id=${job.id})}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size:0.85rem;">Review Applicants</a>
                                    <a th:href="@{/employer/job/delete/{id}(id=${job.id})}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size:0.85rem; color:var(--danger-color)!important; border-color:var(--border-light);" onclick="return confirm('Delete this job posting forever?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
