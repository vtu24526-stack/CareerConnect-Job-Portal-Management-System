<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Student Dashboard')}"></head>
<body>
    <div class="bg-pattern" style="opacity: 0.1"></div>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <main class="container animate-fade-up" style="max-width: 1000px; margin-top: 3rem;">
        <div style="margin-bottom: 2.5rem;">
            <p style="color:var(--text-secondary); font-weight:600; text-transform:uppercase; font-size:0.85rem; letter-spacing:0.05em; margin-bottom:0.25rem;">Candidate Profile</p>
            <h1 style="font-size: 2.25rem; letter-spacing:-0.03em;">My Applications</h1>
        </div>
        
        <div class="card" style="padding: 2rem;">
            
            <div th:if="${applications.empty}" style="padding: 4rem 2rem; text-align:center; background: #fafafa; border-radius: var(--radius-lg); border: 1px dashed var(--border-color);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px; color:var(--text-tertiary); margin-bottom:1rem;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <h3 style="font-size:1.1rem; margin-bottom:0.5rem;">Ready for your next role?</h3>
                <p style="color:var(--text-secondary); font-size:0.95rem; margin-bottom: 1.5rem;">You haven't applied to any jobs yet. Start tracking your applications here.</p>
                <a th:href="@{/jobs}" class="btn btn-primary" style="padding: 0.6rem 1.5rem;">Browse Opportunities</a>
            </div>
            
            <div th:unless="${applications.empty}" class="table-responsive" style="border-radius: var(--radius-md); box-shadow: none; border: 1px solid var(--border-light);">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Position & Details</th>
                            <th>Status</th>
                            <th style="text-align:right;">Reference</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td style="padding: 1.25rem 1.5rem;">
                                <div style="font-weight:600; color:var(--text-primary); margin-bottom:0.25rem;" th:text="${app.job.title}">Title</div>
                                <div style="font-size:0.85rem; color:var(--text-secondary);">
                                    <span th:text="${app.job.employer.name}" style="font-weight:500;">Company</span> &middot; <span th:text="${app.job.location}">Location</span>
                                </div>
                            </td>
                            <td style="vertical-align:middle;">
                                <!-- Map status dynamically: if APPLIED=gray, SHORTLISTED=green, REJECTED=red -->
                                <span th:if="${#strings.equalsIgnoreCase(app.status, 'APPLIED')}" class="badge badge-gray" style="font-size:0.8rem;">Pending Review</span>
                                <span th:if="${#strings.equalsIgnoreCase(app.status, 'SHORTLISTED')}" class="badge badge-green" style="font-size:0.8rem;">Shortlisted</span>
                                <span th:if="${#strings.equalsIgnoreCase(app.status, 'REJECTED')}" class="badge badge-red" style="font-size:0.8rem;">Not Selected</span>
                            </td>
                            <td style="text-align:right; vertical-align:middle; padding-right:1.5rem;">
                                <a th:href="@{/jobs/detail/{id}(id=${app.job.id})}" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size:0.85rem;">View Application</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
