<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Browse Jobs')}"></head>
<body>
    <div class="bg-pattern" style="opacity: 0.2"></div>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <main class="container animate-fade-up">
        <div style="margin-bottom: 3rem; text-align: center;">
            <h1 style="font-size: 2.75rem; letter-spacing: -0.03em; margin-bottom: 1rem;">Explore <span style="color:var(--brand-color);">Opportunities</span></h1>
            <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">Discover your next career move at top-tier companies.</p>
        </div>
        
        <form th:action="@{/jobs}" method="get" class="search-container" style="margin: 0 auto 3rem auto; flex-wrap: wrap; border-radius: var(--radius-lg); padding: 0.5rem; background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
            <div style="display: flex; flex: 1; align-items: center; min-width: 250px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px; color:var(--text-tertiary); margin-left:1rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" name="keyword" th:value="${param.keyword}" class="form-control" placeholder="Search by job title..." style="border:none; box-shadow:none; padding:1rem; flex:1;">
            </div>
            <div class="search-divider" style="display: block;"></div>
            <div style="display: flex; flex: 1; align-items: center; min-width: 200px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px; color:var(--text-tertiary); margin-left:1rem;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <input type="text" name="location" th:value="${param.location}" class="form-control" placeholder="Location..." style="border:none; box-shadow:none; padding:1rem; flex:1;">
            </div>
            <div class="search-divider" style="display: block;"></div>
            <div style="display: flex; flex: 1; align-items: center; min-width: 150px;">
                <select name="jobType" class="form-control" style="border:none; box-shadow:none; padding:1rem; flex:1; background: transparent; cursor: pointer;">
                    <option value="">Any Job Type</option>
                    <option value="Full-time" th:selected="${param.jobType != null and param.jobType[0] == 'Full-time'}">Full-time</option>
                    <option value="Part-time" th:selected="${param.jobType != null and param.jobType[0] == 'Part-time'}">Part-time</option>
                    <option value="Contract" th:selected="${param.jobType != null and param.jobType[0] == 'Contract'}">Contract</option>
                    <option value="Internship" th:selected="${param.jobType != null and param.jobType[0] == 'Internship'}">Internship</option>
                </select>
            </div>
            <div class="search-divider" style="display: block;"></div>
            <div style="display: flex; flex: 1; align-items: center; min-width: 150px;">
                <span style="padding-left: 1rem; color: var(--text-tertiary); font-weight: 500;">$</span>
                <input type="number" name="minSalary" th:value="${param.minSalary}" class="form-control" placeholder="Min Salary" style="border:none; box-shadow:none; padding:1rem 1rem 1rem 0.5rem; flex:1;">
            </div>
            <button type="submit" class="btn btn-brand" style="border-radius: var(--radius-md); padding: 0.75rem 2rem; margin: 0.25rem;">Search</button>
        </form>

        <div th:if="${jobs.empty}" class="card" style="text-align:center; padding: 4rem 2rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px; color:var(--border-color); margin-bottom:1rem;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">No opportunities found</h2>
            <p style="color: var(--text-secondary);">Try adjusting your search criteria or keywords.</p>
        </div>

        <div class="job-grid">
            <a th:each="job : ${jobs}" th:href="@{/jobs/detail/{id}(id=${job.id})}" class="job-card" style="text-decoration:none; display: block; color:inherit;">
                <div class="job-header">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 0.5rem;">
                        <h3 class="job-title" th:text="${job.title}">Job Title</h3>
                        <span class="badge badge-blue">New</span>
                    </div>
                    <div class="job-company" th:text="${job.employer.name}" style="margin-bottom: 1rem;">Company Name</div>
                    
                    <div class="job-meta">
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            <span th:text="${job.location}">Location</span>
                        </span>
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            $<span th:text="${job.salary}">Salary</span>
                        </span>
                        <span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                            <span th:text="${job.jobType}">Job Type</span>
                        </span>
                    </div>
                </div>
                <div style="margin-top:auto; padding-top:1rem; border-top:1px solid var(--border-light); font-size: 0.85rem; color:var(--brand-color); font-weight:600; display:flex; align-items:center;">
                    View Details
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px; margin-left:0.25rem;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            </a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
