<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
    <div class="bg-pattern"></div>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <main class="container animate-fade-up" style="display:flex; justify-content:center; align-items:center; min-height: 80vh;">
        <div class="card" style="width: 100%; max-width: 420px; padding: 3rem 2.5rem; text-align: left;">
            <div style="text-align:center; margin-bottom: 2rem;">
                <!-- Monoline lock icon -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; color: var(--text-primary); margin-bottom: 1rem;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <h2 style="font-size: 1.5rem; letter-spacing: -0.02em;">Welcome back</h2>
                <p style="color: var(--text-secondary); font-size: 0.95rem; margin-top: 0.25rem;">Sign in to your account to continue</p>
            </div>
            
            <div th:if="${param.error}" class="alert alert-danger" style="margin-bottom: 1.5rem; font-size: 0.85rem; padding: 0.75rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; margin-right: 0.5rem;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                Invalid credentials provided.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" style="margin-bottom: 1.5rem; font-size: 0.85rem; padding: 0.75rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; margin-right: 0.5rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                You have been securely logged out.
            </div>
            <div th:if="${param.success}" class="alert alert-success" style="margin-bottom: 1.5rem; font-size: 0.85rem; padding: 0.75rem;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; margin-right: 0.5rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                Registration successful. Please sign in.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group mb-3">
                    <label class="form-label" style="font-size: 0.85rem; font-weight: 600;">Email Address</label>
                    <input type="email" name="email" class="form-control" required placeholder="name@company.com" style="padding: 0.75rem 1rem;">
                </div>
                <div class="form-group mb-4">
                    <div style="display:flex; justify-content:space-between; align-items: baseline;">
                        <label class="form-label" style="font-size: 0.85rem; font-weight: 600;">Password</label>
                    </div>
                    <input type="password" name="password" class="form-control" required placeholder="••••••••" style="padding: 0.75rem 1rem;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 0.95rem; justify-content: center;">Sign In</button>
            </form>
            
            <div style="text-align:center; margin-top: 2rem; font-size: 0.85rem; color: var(--text-secondary);">
                Don't have an account? <a th:href="@{/register}" style="font-weight: 600; color: var(--text-primary);">Create one</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
