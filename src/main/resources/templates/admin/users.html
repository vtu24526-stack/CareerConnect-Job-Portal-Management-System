<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Users')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    
    <main class="container animate-fade-in">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
            <div style="display:flex; align-items:center;">
                <a th:href="@{/admin/dashboard}" style="display:inline-block; margin-right:1.5rem; font-size:1.2rem; text-decoration:none;">←</a>
                <h1 style="margin:0;">Manage <span style="color:var(--primary-color);">Users</span></h1>
            </div>
        </div>
        
        <div class="card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.id}">ID</td>
                            <td style="font-weight:600;" th:text="${user.name}">Name</td>
                            <td th:text="${user.email}">Email</td>
                            <td th:text="${user.role}">Role</td>
                            <td>
                                <a th:if="${user.role.name() != 'ADMIN'}" th:href="@{/admin/user/delete/{id}(id=${user.id})}" class="btn btn-danger" style="padding: 0.3rem 0.8rem; font-size:0.9rem;" onclick="return confirm('Are you sure?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
